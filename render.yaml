# Blueprint de Render. Al conectar el repo, Render lee esto y configura el servicio.
services:
  - type: web
    name: informes-demo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DEMO_MODEL
        value: claude-opus-4-8
      # Voz Whisper en directo (se rellena en el panel de Render, no en el código):
      - key: GROQ_API_KEY
        sync: false
      # Opcional: IA de informes en directo. Si se deja vacía -> modo pre-cocinado.
      - key: ANTHROPIC_API_KEY
        sync: false
