<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Informes — demo</title><style>
/* ===========================================================================
   "Ethereal Clinical Premium" — sistema de diseño modernizado de alta gama.
   =========================================================================== */
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');

:root{
  --bg-app: linear-gradient(135deg, #f6f8fb 0%, #edeef3 100%);
  --bg-panel: rgba(255, 255, 255, 0.85);
  --text-main: #1d253c; 
  --text-muted: #6b778c;
  --primary: #345e77; 
  --primary-hover: #264658;
  --action-dictar: #10b981; 
  --action-dictar-hover: #059669;
  --action-terra: #f06a4f; 
  --action-terra-soft: #fcece9; 
  --action-leer: #3b82f6;
  --bg-hallazgos: #fef8eb; 
  --border-hallazgos: #f5d0a9;
  --bg-borrador: #f3f0fa; 
  --border-borrador: #dbd0f0;
  --mod-pet: #7c3aed; 
  --mod-mn: #059669; 
  --mod-tac: #ea580c; 
  --mod-cardio: #db2777;
  --shadow-soft: 0 10px 30px -10px rgba(0, 0, 0, 0.04), 0 1px 3px rgba(0, 0, 0, 0.02);
  --shadow-hover: 0 20px 40px -15px rgba(52, 94, 119, 0.15), 0 2px 8px rgba(0, 0, 0, 0.04);
  --shadow-inner: inset 0 2px 8px rgba(0, 0, 0, 0.02);
  --radius-sm: 10px; 
  --radius: 16px; 
  --radius-lg: 24px; 
  --radius-pill: 9999px;
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-app);
  color: var(--text-main);
  line-height: 1.6;
  font-size: 14.5px;
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

header {
  padding: 20px 30px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
  max-width: 1320px;
  margin: 0 auto;
}

header .logo {
  width: 38px;
  height: 38px;
  border-radius: 12px;
  background: linear-gradient(135deg, var(--primary), var(--action-dictar));
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-weight: 700;
  font-size: 20px;
  flex: 0 0 auto;
  box-shadow: 0 4px 15px rgba(52, 94, 119, 0.25);
  animation: logoPulse 4s infinite ease-in-out;
}

@keyframes logoPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

header h1 {
  font-size: 1.4rem;
  font-weight: 300;
  letter-spacing: -.5px;
  margin-right: auto;
  color: var(--primary);
}

header h1 strong {
  font-weight: 600;
  color: var(--text-main);
}

.demo-tag {
  background: linear-gradient(135deg, var(--action-terra), #ff8a70);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: var(--radius-pill);
  letter-spacing: 1px;
  box-shadow: 0 4px 10px rgba(240, 106, 79, 0.2);
}

select, button, input, textarea {
  font-family: inherit;
  font-size: 14px;
  border: none;
  transition: all .25s cubic-bezier(.2,1,.2,1);
  outline: none;
}

select, button {
  border-radius: var(--radius-pill);
  padding: 10px 22px;
  font-weight: 600;
  letter-spacing: .3px;
  background: rgba(25, 31, 47, 0.04);
  color: var(--text-main);
  box-shadow: var(--shadow-soft);
  cursor: pointer;
}

select {
  background: #fff;
  border: 1px solid rgba(25, 31, 47, 0.08);
  font-weight: 500;
  padding-right: 32px;
}

select:hover, button:hover:not(:disabled) {
  box-shadow: var(--shadow-hover);
  transform: translateY(-2px);
}

select:hover {
  border-color: rgba(52, 94, 119, 0.3);
}

button:active:not(:disabled) {
  transform: translateY(-0.5px) scale(.98);
}

button:disabled {
  opacity: .4;
  cursor: not-allowed;
  box-shadow: none;
  transform: none !important;
}

button.secundario {
  background: #fff;
  color: var(--primary);
  border: 1px solid rgba(25, 31, 47, 0.08);
}

button.secundario:hover {
  background: #fbfbfc;
  border-color: var(--primary);
}

button.grande {
  background: var(--action-dictar);
  color: #fff;
  padding: 14px 30px;
  font-size: 15px;
  box-shadow: 0 4px 15px rgba(16, 185, 129, 0.2);
}

button.grande:hover:not(:disabled) {
  background: var(--action-dictar-hover);
  box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
}

button.primario {
  background: var(--primary);
  color: #fff;
  box-shadow: 0 4px 15px rgba(52, 94, 119, 0.2);
}

button.primario:hover:not(:disabled) {
  background: var(--primary-hover);
  box-shadow: 0 8px 25px rgba(52, 94, 119, 0.3);
}

button.peligro {
  background: var(--action-terra);
  color: #fff;
  box-shadow: 0 4px 15px rgba(240, 106, 79, 0.2);
}

button.peligro:hover:not(:disabled) {
  background: #d8543a;
  box-shadow: 0 8px 25px rgba(240, 106, 79, 0.3);
}

label {
  font-size: 11px;
  color: var(--text-muted);
  display: block;
  margin-bottom: 5px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  font-weight: 600;
}

input, textarea {
  border-radius: var(--radius-sm);
  padding: 11px 15px;
  background: #fff;
  color: var(--text-main);
  border: 1px solid rgba(25, 31, 47, 0.08);
  box-shadow: var(--shadow-inner);
  width: 100%;
  transition: border-color .25s ease, box-shadow .25s ease;
}

input:focus, textarea:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 4px rgba(52, 94, 119, 0.1), var(--shadow-inner);
}

.status-pill, #estado {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  padding: 9px 18px;
  border-radius: var(--radius-pill);
  box-shadow: var(--shadow-soft);
  border: 1px solid rgba(25, 31, 47, 0.05);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
}

.dot {
  display: inline-block;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #b3bac5;
  position: relative;
}

.dot.ok {
  background: var(--action-dictar);
  box-shadow: 0 0 8px var(--action-dictar);
}

.dot.off {
  background: #cbd2da;
}

/* tabs */
.tab-bar-wrap {
  max-width: 1320px;
  margin: 0 auto 26px;
  padding: 0 30px;
}

.tab-bar {
  display: inline-flex;
  background: rgba(25, 31, 47, 0.05);
  padding: 5px;
  border-radius: var(--radius-pill);
  gap: 4px;
  flex-wrap: wrap;
  backdrop-filter: blur(10px);
  border: 1px solid rgba(25, 31, 47, 0.02);
}

.tab-btn {
  background: transparent;
  box-shadow: none;
  padding: 9px 24px;
  font-size: 13.5px;
  color: var(--text-muted);
  border-radius: var(--radius-pill);
}

.tab-btn:hover:not(.activo) {
  color: var(--text-main);
  background: rgba(255, 255, 255, 0.5);
  box-shadow: none;
  transform: none;
}

.tab-btn.activo {
  background: #fff;
  color: var(--primary);
  box-shadow: 0 4px 15px rgba(25, 31, 47, 0.06);
}

/* layout */
main {
  max-width: 1320px;
  margin: 0 auto;
  padding: 0 30px 40px;
  animation: pageFadeIn 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
}

main.cols {
  display: grid;
  grid-template-columns: 40% 60%;
  gap: 34px;
  align-items: start;
}

@media (max-width: 1024px) {
  main.cols {
    grid-template-columns: 1fr;
  }
}

@keyframes pageFadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.panel {
  background: var(--bg-panel);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-soft);
  padding: 30px;
  border: 1px solid rgba(255, 255, 255, 0.6);
  display: flex;
  flex-direction: column;
  gap: 14px;
  margin-bottom: 22px;
}

h2 {
  font-size: 1.15rem;
  font-weight: 600;
  margin-bottom: 6px;
  color: var(--text-main);
  letter-spacing: -.3px;
}

.panel h2 {
  font-size: 11px;
  text-transform: uppercase;
  color: var(--text-muted);
  letter-spacing: .1em;
  font-weight: 700;
  border-bottom: 1px solid rgba(25, 31, 47, 0.05);
  padding-bottom: 8px;
  margin-bottom: 4px;
}

.row {
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
  align-items: flex-end;
}

.row > div {
  min-width: 0;
  flex: 1;
}

.muted {
  color: var(--text-muted);
}

.small {
  font-size: 12.5px;
}

.hidden {
  display: none !important;
}

/* paciente */
.demo-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 16px 24px;
  margin: 6px 0 8px;
  padding: 22px;
  background: linear-gradient(145deg, rgba(255,255,255,0.9), rgba(247,248,250,0.8));
  border-radius: var(--radius);
  border: 1px solid rgba(25, 31, 47, 0.04);
  box-shadow: var(--shadow-inner);
}

.demo-grid .label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 4px;
  font-weight: 600;
}

.demo-grid .valor {
  font-size: 15px;
  font-weight: 500;
  color: var(--text-main);
}

/* previos */
.previo {
  background: rgba(255, 255, 255, 0.6);
  border: 1px solid rgba(25, 31, 47, 0.06);
  border-radius: var(--radius-sm);
  margin-bottom: 10px;
  overflow: hidden;
  transition: border-color .2s ease, box-shadow .2s ease;
}

.previo:hover {
  border-color: rgba(52, 94, 119, 0.3);
  box-shadow: 0 4px 12px rgba(25, 31, 47, 0.02);
}

.previo summary {
  padding: 14px 18px;
  cursor: pointer;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 13.5px;
  user-select: none;
}

.previo summary .fecha {
  font-weight: 600;
  color: var(--primary);
  min-width: 90px;
}

.previo summary .tipo {
  color: var(--text-muted);
  flex: 1;
  font-weight: 500;
}

.previo .texto-informe {
  padding: 18px;
  background: #fff;
  white-space: pre-wrap;
  font-size: 13.5px;
  border-top: 1px dashed rgba(25, 31, 47, 0.08);
  line-height: 1.6;
}

.previo summary .chk-comparar {
  width: 16px;
  height: 16px;
  cursor: pointer;
  flex: 0 0 auto;
}

.previo.seleccionado {
  border-color: var(--primary);
  background: rgba(52, 94, 119, 0.02);
  box-shadow: 0 0 0 1px var(--primary) inset;
}

/* paneles IA */
.motivo-panel {
  background: #edfcf5;
  border: 1px solid #c2ffd8;
  padding: 18px 22px;
  border-radius: var(--radius);
  margin: 6px 0;
  box-shadow: 0 4px 12px rgba(16, 185, 129, 0.04);
}

.motivo-panel h3 {
  color: var(--action-dictar-hover);
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}

.motivo-panel .raw {
  font-size: 13.5px;
  white-space: pre-wrap;
  color: var(--text-main);
}

.motivo-panel .refinado {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px dashed #bfe3cd;
  font-size: 14px;
  font-weight: 500;
  color: #0b6646;
}

.hallazgos-panel {
  background: var(--bg-hallazgos);
  border: 1px solid var(--border-hallazgos);
  padding: 18px 22px;
  border-radius: var(--radius);
  margin-top: 6px;
  box-shadow: 0 4px 12px rgba(245, 208, 169, 0.1);
}

.hallazgos-panel h3 {
  color: #785817;
  font-weight: 700;
  margin-bottom: 8px;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* textareas / grabar */
textarea.grande {
  min-height: 160px;
}

textarea.informe {
  min-height: 440px;
  font-size: 15px;
  background: #fff;
  box-shadow: 0 15px 40px rgba(25, 31, 47, 0.05);
  padding: 26px;
  border-color: rgba(25, 31, 47, 0.05);
  line-height: 1.7;
}

.grabar-zona {
  background: #fff;
  border: 1px solid rgba(25, 31, 47, 0.06);
  border-radius: var(--radius);
  padding: 22px;
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 8px 0;
  box-shadow: var(--shadow-soft);
  transition: all .4s cubic-bezier(0.16, 1, 0.3, 1);
}

.grabar-zona .dot {
  width: 12px;
  height: 12px;
  background: #b3bac5;
}

.grabar-zona.grabando {
  background: #fffdfb;
  box-shadow: 0 10px 30px rgba(240, 106, 79, 0.12);
  border-color: var(--action-terra-soft);
}

.grabar-zona.grabando .dot {
  background: var(--action-terra);
  animation: pulso 1.5s infinite;
}

.grabar-zona.procesando .dot {
  background: var(--mod-tac);
  animation: pulso 1.5s infinite;
}

@keyframes pulso {
  0%, 100% { box-shadow: 0 0 0 0 rgba(240, 106, 79, 0.5); }
  50% { box-shadow: 0 0 0 10px rgba(240, 106, 79, 0); }
}

.timer {
  font-family: ui-monospace, Consolas, monospace;
  color: var(--text-muted);
  font-weight: 600;
  font-size: 14px;
}

.dictado-estado {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin: 10px 0;
}

.dictado-estado .bloque-linea {
  font-size: 13.5px;
  color: #0b6646;
  background: #e6f7ef;
  border: 1px solid #a7f3d0;
  border-radius: var(--radius-sm);
  padding: 10px 16px;
  font-weight: 600;
  animation: elementFadeIn 0.3s ease;
}

@keyframes elementFadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.dictado-estado .bloque-hint {
  font-size: 12.5px;
  color: var(--text-muted);
  font-style: italic;
  padding: 2px 4px;
}

.btn-mas {
  font-size: 18px;
  line-height: 1;
  width: 36px;
  height: 36px;
  padding: 0;
  background: var(--primary);
  border-radius: 12px;
  color: #fff;
  cursor: pointer;
  font-weight: 700;
  box-shadow: var(--shadow-soft);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.btn-mas:hover:not(:disabled) {
  background: var(--primary-hover);
  transform: translateY(-2px);
  box-shadow: var(--shadow-hover);
}

.aviso {
  background: rgba(52, 94, 119, 0.05);
  color: var(--primary);
  padding: 14px 16px;
  border-radius: var(--radius-sm);
  font-size: 13.5px;
  border-left: 4px solid var(--primary);
}

.aviso.warn {
  background: #fdf6ea;
  color: #7b5817;
  border-left-color: #f5d0a9;
}

/* listas / tablas */
.act-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  background: #fff;
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow-soft);
  border: 1px solid rgba(25, 31, 47, 0.05);
}

.act-table th, .act-table td {
  padding: 14px 18px;
  text-align: left;
  border-bottom: 1px solid rgba(25, 31, 47, 0.05);
  vertical-align: middle;
}

.act-table th {
  background: #f8f9fa;
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  font-size: 11px;
  letter-spacing: 1px;
}

.act-table tr:last-child td {
  border-bottom: none;
}

.act-table tr {
  transition: background-color .15s ease;
}

.act-table tr:hover td {
  background: #f8fafd;
}

.act-table tr.asignado td {
  background: rgba(16, 185, 129, 0.05);
}

.act-table tr.asignado:hover td {
  background: rgba(16, 185, 129, 0.08);
}

.badge-mod {
  font-size: 10px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: var(--radius-sm);
  color: #fff;
  letter-spacing: .05em;
  background: var(--text-muted);
}

.badge-mod.PET { background: var(--mod-pet); }
.badge-mod.MN { background: var(--mod-mn); }
.badge-mod.CARDIO { background: var(--mod-cardio); }

.fase-pill {
  font-size: 10px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  margin-left: 6px;
  letter-spacing: .02em;
}

.fase-pill.reposo { background: #eaecf0; color: #475467; }
.fase-pill.esfuerzo { background: #ffe4e6; color: #9f1239; }

.btn-asignar {
  font-size: 11.5px;
  padding: 7px 16px;
  background: var(--primary);
  color: #fff;
  border-radius: var(--radius-pill);
  cursor: pointer;
  white-space: nowrap;
}

.btn-asignar:hover {
  background: var(--primary-hover);
}

.btn-abrir {
  font-size: 11.5px;
  padding: 7px 16px;
  border-radius: var(--radius-pill);
  cursor: pointer;
  white-space: nowrap;
}

.btn-abrir.dictar {
  background: var(--action-dictar);
  color: #fff;
}
.btn-abrir.dictar:hover {
  background: var(--action-dictar-hover);
}

.btn-abrir.anamnesis {
  background: var(--action-leer);
  color: #fff;
}
.btn-abrir.anamnesis:hover {
  background: #2563eb;
}

/* botón "Imágenes" — abre el estudio en syngo.via */
.btn-imagenes {
  font-size: 13px;
  padding: 9px 18px;
  border-radius: var(--radius-pill);
  background: linear-gradient(135deg, var(--mod-pet), var(--action-leer));
  color: #fff;
  font-weight: 600;
  white-space: nowrap;
  box-shadow: 0 4px 15px rgba(124, 58, 237, 0.2);
}
.btn-imagenes:hover:not(:disabled) {
  box-shadow: 0 8px 25px rgba(124, 58, 237, 0.3);
}

.toolbar {
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 22px;
  background: #fff;
  padding: 16px 20px;
  border-radius: var(--radius);
  box-shadow: var(--shadow-soft);
  border: 1px solid rgba(25, 31, 47, 0.04);
}

.filtros {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.filtros button {
  padding: 7px 18px;
  font-size: 13px;
  background: #fff;
  color: var(--primary);
  border: 1px solid rgba(25, 31, 47, 0.08);
  box-shadow: none;
}

.filtros button:hover {
  border-color: var(--primary);
  background: rgba(52, 94, 119, 0.02);
}

.filtros button.activo {
  background: var(--primary);
  color: #fff;
  border-color: var(--primary);
  box-shadow: var(--shadow-soft);
}

/* cardio: anamnesis + protocolo */
.card {
  background: #fff;
  border: 1px solid rgba(25, 31, 47, 0.06);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 18px;
  box-shadow: var(--shadow-soft);
}

.sec {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--primary);
  font-weight: 700;
  margin-bottom: 14px;
  padding-bottom: 8px;
  border-bottom: 1px solid rgba(52, 94, 119, 0.15);
}

.g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
.g4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

@media (max-width: 700px) {
  .g2, .g3, .g4 { grid-template-columns: 1fr; }
}

.kv {
  display: flex;
  flex-direction: column;
  gap: 4px;
  font-size: 13.5px;
}

.kv .k {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 1.2px;
  font-weight: 600;
}

.kv .v {
  font-weight: 500;
  color: var(--text-main);
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.chip {
  background: rgba(52, 94, 119, 0.06);
  color: var(--primary);
  border-radius: var(--radius-pill);
  padding: 5px 14px;
  font-size: 12.5px;
  font-weight: 600;
  border: 1px solid rgba(52, 94, 119, 0.04);
}

.chip.neg {
  background: #f2f4f7;
  color: #475467;
  border-color: transparent;
}

.chip.red {
  background: #ffe4e6;
  color: #be123c;
  border-color: transparent;
}

.tog {
  display: inline-flex;
  background: rgba(25, 31, 47, 0.04);
  padding: 4px;
  border-radius: var(--radius-pill);
  gap: 3px;
  border: 1px solid rgba(25, 31, 47, 0.02);
}

.tog .tog-btn {
  padding: 7px 16px;
  font-size: 12.5px;
  background: transparent;
  box-shadow: none;
  color: var(--text-muted);
  border-radius: var(--radius-pill);
}

.tog .tog-btn.activo {
  background: #fff;
  color: var(--primary);
  box-shadow: var(--shadow-soft);
}

.fila-medic {
  display: grid;
  grid-template-columns: 2fr 1fr 1fr;
  gap: 12px;
  padding: 9px 0;
  border-bottom: 1px solid rgba(25, 31, 47, 0.06);
  font-size: 13.5px;
}

.fila-medic:last-child {
  border-bottom: none;
}

.dictar-campos {
  background: #f7f6fc;
  border: 1px solid var(--border-borrador);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-bottom: 16px;
}

.dictar-campos .ayuda {
  font-size: 12.5px;
  color: #5b21b6;
  margin: 6px 0;
  font-weight: 500;
}

.report-box {
  white-space: pre-wrap;
  background: #fff;
  border: 1px solid rgba(25, 31, 47, 0.08);
  border-radius: var(--radius);
  padding: 24px;
  font-size: 15px;
  line-height: 1.7;
  min-height: 320px;
  box-shadow: var(--shadow-inner);
}

.modo-badge {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 12px;
  border-radius: var(--radius-pill);
  margin-left: 8px;
  letter-spacing: .02em;
}

.modo-badge.directo { background: #ecfdf5; color: #047857; }
.modo-badge.precocinado { background: #fffbeb; color: #b45309; }

/* volver */
.volver {
  cursor: pointer;
  color: var(--primary);
  font-weight: 600;
  font-size: 13.5px;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 16px;
  transition: color .2s ease;
}

.volver:hover {
  color: var(--primary-hover);
}

.btn-row {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  margin-top: 16px;
}

/* ===========================================================================
   Rediseño del módulo de perfusión miocárdica (portado de la app real):
   clinical-cards, grids, toggles agrupados azules y árbol de vasos afectos.
   =========================================================================== */
.clinical-card {
  background: #fff;
  border: 1px solid rgba(25, 31, 47, 0.08);
  border-left: 4px solid var(--primary);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
  box-shadow: 0 4px 20px rgba(25, 31, 47, 0.015);
  transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.clinical-card:hover {
  box-shadow: 0 12px 35px rgba(25, 31, 47, 0.04);
  border-color: rgba(25, 31, 47, 0.12);
  transform: translateY(-1px);
}

.clinical-card h3 {
  font-size: 13px;
  text-transform: uppercase;
  color: var(--primary);
  letter-spacing: .08em;
  font-weight: 700;
  border-bottom: 1px solid rgba(25, 31, 47, 0.06);
  padding-bottom: 10px;
  margin: 0;
}

.form-grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 18px; }
.form-grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.form-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }

@media (max-width: 760px) {
  .form-grid-2, .form-grid-3, .form-grid-4 { grid-template-columns: 1fr; }
}

/* sub-tarjeta blanca dentro de una clinical-card */
.sub-card {
  background: #fafafb;
  padding: 18px;
  border: 1px solid rgba(25, 31, 47, 0.06);
  border-radius: var(--radius-sm);
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.sub-card .tit {
  font-weight: 700;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: .8px;
  color: var(--text-main);
  border-bottom: 1px solid rgba(25, 31, 47, 0.04);
  padding-bottom: 6px;
  margin-bottom: 2px;
}

/* árbol de arterias / vasos afectos (EAC conocida) */
.arterias-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
  gap: 16px;
  margin-top: 4px;
}

.arteria-card {
  background: #fdfdfe;
  border: 1px solid rgba(25, 31, 47, 0.06);
  border-radius: var(--radius-sm);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.01);
}

.arteria-card h4 {
  font-size: 12.5px;
  text-transform: uppercase;
  color: var(--text-main);
  letter-spacing: .05em;
  font-weight: 700;
  border-bottom: 1px solid rgba(25, 31, 47, 0.04);
  padding-bottom: 8px;
  margin: 0;
}

.rama-label {
  padding-left: 16px;
  position: relative;
  font-size: 13.5px;
  color: var(--text-main);
}

.rama-label::before {
  content: "└";
  position: absolute;
  left: 2px;
  color: var(--text-muted);
  font-weight: bold;
}

/* toggles agrupados — el estado activo usa el azul médico (antes rojo) */
.btn-group {
  display: inline-flex;
  background: rgba(25, 31, 47, 0.05);
  padding: 4px;
  border-radius: var(--radius-pill);
  gap: 3px;
  border: 1px solid rgba(25, 31, 47, 0.02);
  align-self: flex-start;
}

.btn-group .bg-item {
  padding: 7px 16px;
  font-size: 12.5px;
  border-radius: var(--radius-pill);
  color: var(--text-muted);
  font-weight: 600;
  white-space: nowrap;
  transition: all .2s ease;
}

.btn-group .bg-item.activo {
  background: var(--primary);
  color: #fff;
  box-shadow: var(--shadow-soft);
}
</style>
</head>

<header>

  <h1>Informes <strong>· dictado guiado</strong></h1>
  <span class="demo-tag">DEMO</span>

<div class="tab-bar-wrap">

<main id="mainPendientes">

</body>
